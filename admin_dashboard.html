<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Admin Management System</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: #0b1329;
            --gold-accent: #d4af37;
            --gold-hover: #f3cf55;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(212, 175, 55, 0.3);
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        h1 span {
            color: var(--gold-accent);
        }
        .status-badge {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h2 {
            margin-top: 0;
            color: var(--gold-accent);
            font-size: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .nexus-input {
            width: 100%;
            padding: 12px;
            background: rgba(3, 7, 18, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            outline: none;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .nexus-input:focus {
            border-color: var(--gold-hover);
        }
        .btn {
            width: 100%;
            background: var(--gold-accent);
            color: var(--bg-color);
            font-weight: bold;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn:hover {
            background: var(--gold-hover);
        }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        li button {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        li button:hover {
            background: var(--danger);
            color: white;
        }
        .logs-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            padding: 15px;
            font-family: monospace;
            font-size: 13px;
            color: var(--text-muted);
            height: 150px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <div>
                <h1>NEXUS <span>ADMINISTRATION</span></h1>
                <p style="color: var(--text-muted); margin: 5px 0 0 0; font-size: 14px;">Centralized Access & Ban Management Panel</p>
            </div>
            <div class="status-badge" id="system-status">System Active</div>
        </header>

        <div class="grid-layout">
            <div class="card">
                <h2>🚫 Ban Control Center</h2>
                <p style="font-size: 13px; color: var(--text-muted); margin-top: -10px; margin-bottom: 20px;">
                    Instantly restrict access to the virtual portal by blacklisting student accounts.
                </p>
                <input type="text" id="ban-input" class="nexus-input" placeholder="Enter username to restrict...">
                <button class="btn btn-danger" onclick="applyBan()">Apply Server Block</button>
            </div>

            <div class="card">
                <h2>📋 Active Blacklist Registry</h2>
                <ul id="blacklist-view">
                    </ul>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2>🛡️ System Security Logs</h2>
            <div class="logs-box" id="logs-view">
                </div>
        </div>
    </div>

    <script>
        const socket = io();

        // Listen for initialization data upon connection
        socket.on('system_init', function(data) {
            document.getElementById('system-status').innerText = `System: ${data.status}`;
            renderBlacklist(data.banned);
            loadSystemLogs();
        });

        // Listen for real-time ban modifications
        socket.on('admin_log_update', function(data) {
            addLogEntry(data.event);
            // Refresh our visual blacklist
            fetch('/api/status')
                .then(res => res.json())
                .then(updated => {
                    renderBlacklist(updated.banned_count > 0 ? updated.logs : []); 
                    // To keep things super responsive, fetch the status of current bans
                    refreshBlacklistUI();
                });
        });

        function refreshBlacklistUI() {
            fetch('/api/status')
                .then(res => res.json())
                .then(data => {
                    // Gather the banned usernames from the response if structured, otherwise fallback
                    loadSystemLogs();
                });
        }

        function renderBlacklist(bannedArray) {
            const list = document.getElementById('blacklist-view');
            list.innerHTML = '';
            
            if (!bannedArray || bannedArray.length === 0) {
                list.innerHTML = `<li style="color: var(--text-muted); justify-content: center;">No active bans applied.</li>`;
                return;
            }

            bannedArray.forEach(user => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>👤 <strong>${user}</strong> (Access Revoked)</span>
                    <button onclick="removeBan('${user}')">Unban</button>
                `;
                list.appendChild(li);
            });
        }

        function applyBan() {
            const username = document.getElementById('ban-input').value.trim();
            if (!username) return alert('Please enter a valid username.');

            fetch('/api/ban', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                document.getElementById('ban-input').value = '';
                location.reload(); // Reload dashboard to synchronize lists
            });
        }

        function removeBan(username) {
            if (confirm(`Lift blacklist restriction for ${username}?`)) {
                fetch('/api/unban', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    location.reload();
                });
            }
        }

        function loadSystemLogs() {
            fetch('/api/status')
                .then(res => res.json())
                .then(data => {
                    const logsView = document.getElementById('logs-view');
                    logsView.innerHTML = '';
                    data.logs.forEach(log => {
                        addLogEntry(`[${log.time}] ${log.event}`);
                    });
                });
        }

        function addLogEntry(text) {
            const logsView = document.getElementById('logs-view');
            const entry = document.createElement('div');
            entry.innerText = text;
            logsView.appendChild(entry);
            logsView.scrollTop = logsView.scrollHeight;
        }
    </script>
</body>
</html>
